version: "3.9"

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: mobility_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mobility_db
      POSTGRES_USER:     mobility
      POSTGRES_PASSWORD: mobility
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobility -d mobility_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mobility_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mobility:mobility@db:5432/mobility_db
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ml:/app/ml_lib
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── React frontend ────────────────────────────────────────────────────────
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mobility_ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
